name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege — CI only needs to read the checkout.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Formatting + lint are enforced from the wave that adopted them
      # (CONTRIBUTING.md "Formatting/linting"); mechanical, so they run first.
      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint
        run: npx eslint .

      # Syntax-only sweep so a bad file fails fast with a precise location,
      # before anything tries to actually import/bundle it.
      - name: node --check src/ server/ electron/
        run: find src server electron -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Scanner tests
        run: node server/scan.test.js

      - name: Geometry sanity tests
        run: node tests/geometry.test.mjs

      - name: Heightfield tests
        run: node tests/heightfield.test.mjs

      - name: Build
        run: npm run build
